spring.application.name=job-portal

# ─── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/job_portal_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:9059249303}

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Let Hibernate auto-detect the dialect (no deprecation warning)
spring.jpa.open-in-view=true

# ─── File Upload ─────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
upload.dir=uploads

# ─── Thymeleaf ───────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ─── Error Handling ──────────────────────────────────────────────────────────
server.error.whitelabel.enabled=false

# ─── Mail (SMTP) ─────────────────────────────────────────────────────────────
# IMPORTANT: To use Gmail, you must generate an "App Password" from your Google Account settings.
# 1. Enable 2-Step Verification
# 2. Go to Security -> App Passwords
# 3. Select 'Mail' and 'Other' (name it 'JobPortal')
# 4. Copy the 16-character password here.

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:koteshwar907@gmail.com}
spring.mail.password=${MAIL_PASSWORD:abyicoceyurnfuhe}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000




# ─── Google OAuth2 ──────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.org.apache.tomcat.util.http.parser.Cookie=ERROR
