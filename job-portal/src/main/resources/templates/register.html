<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign Up')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container" style="max-width: 600px; margin-top: 2rem;">
        <div class="card">
            <h2 style="margin-bottom: 1.5rem; text-align: center;">Create an Account</h2>
            
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            
            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="form-group">
                    <label>Account Type</label>
                    <select th:field="*{role}" class="form-control" required>
                        <option value="ROLE_STUDENT">Job Seeker (Student)</option>
                        <option value="ROLE_EMPLOYER">Employer (Recruiter)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" th:field="*{username}" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" th:field="*{password}" class="form-control" required>
                    <div style="margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox" id="showRegPwd" onclick="document.getElementById('regPassword').type = this.checked ? 'text' : 'password'">
                        <label for="showRegPwd" style="font-size: 0.85rem; color: var(--text-secondary); margin: 0; cursor: pointer;">Show Password</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
            </form>
            <p style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary);">
                Already have an account? <a th:href="@{/login}">Log in</a>
            </p>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
