<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Forgot Password')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container" style="max-width: 500px; margin-top: 4rem;">
        <div class="card">
            <h2 style="margin-bottom: 1.5rem; text-align: center;">Reset Password</h2>
            
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            
            <form th:action="@{/forgot-password}" method="post">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control" required autofocus placeholder="Enter your registered email">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
            </form>
            <p style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary);">
                Remembered your password? <a th:href="@{/login}">Log in</a>
            </p>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
