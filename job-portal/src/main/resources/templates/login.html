<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Log In')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container" style="max-width: 500px; margin-top: 4rem;">
        <div class="card">
            <h2 style="margin-bottom: 1.5rem; text-align: center;">Welcome Back</h2>
            
            <div th:if="${param.error}" class="alert alert-error">
                <span th:text="${session.SPRING_SECURITY_LAST_EXCEPTION != null ? session.SPRING_SECURITY_LAST_EXCEPTION.message : 'Invalid username or password.'}"></span>
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                You have been logged out.
            </div>
            <div th:if="${param.success}" class="alert alert-success">
                Registered successfully! Please log in.
            </div>
            <div th:if="${param.resetSuccess}" class="alert alert-success">
                Password reset successfully! Please log in.
            </div>
            
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label style="margin-bottom: 0;">Password</label>
                        <a th:href="@{/forgot-password}" style="font-size: 0.85rem;">Forgot Password?</a>
                    </div>
                    <input type="password" id="loginPassword" name="password" class="form-control" required>
                    <div style="margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox" id="showLoginPwd" onclick="document.getElementById('loginPassword').type = this.checked ? 'text' : 'password'">
                        <label for="showLoginPwd" style="font-size: 0.85rem; color: var(--text-secondary); margin: 0; cursor: pointer;">Show Password</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
            </form>

            <div style="margin: 1.5rem 0; display: flex; align-items: center; gap: 1rem;">
                <hr style="flex: 1; border: 0; border-top: 1px solid var(--border-color);">
                <span style="color: var(--text-secondary); font-size: 0.9rem;">OR</span>
                <hr style="flex: 1; border: 0; border-top: 1px solid var(--border-color);">
            </div>

            <a th:href="@{/oauth2/authorization/google}" class="btn" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem; border: 1px solid var(--border-color); background: white; color: var(--text-primary);">
                <img src="https://www.google.com/favicon.ico" width="16" height="16" alt="Google">
                Continue with Google
            </a>

            <p style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary);">
                Don't have an account? <a th:href="@{/register}">Sign up</a>
            </p>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
