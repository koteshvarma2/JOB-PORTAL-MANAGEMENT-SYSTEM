<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Jobs')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container">
        <h2 style="margin-bottom: 2rem;">Available Jobs</h2>
        
        <form th:action="@{/jobs}" method="get" class="search-bar">
            <input type="text" name="keyword" class="form-control" th:value="${keyword}" placeholder="Search by title, category, or location...">
            <button type="submit" class="btn btn-primary">Search</button>
        </form>

        <div th:if="${param.error}" class="alert alert-error">
            You have already applied for this job!
        </div>
        
        <div class="grid" id="jobsGrid">
            <div th:each="job : ${jobs}" class="card">
                <h3 th:text="${job.title}" style="margin-bottom: 0.5rem; color: var(--accent-color);">Job Title</h3>
                <p style="color: var(--text-secondary); margin-bottom: 1rem;" th:text="${job.category} + ' · ' + ${job.location}">Category · Location</p>
                <div style="margin-bottom: 1rem;">
                    <strong>Experience:</strong> <span th:text="${job.experience}"></span><br>
                    <strong>Salary:</strong> <span th:text="${job.salary}"></span><br>
                    <strong>Skills:</strong> <span th:text="${job.skills}"></span>
                </div>
                <p th:text="${job.description}" style="margin-bottom: 1.5rem; font-size: 0.9rem;">Description...</p>
                
                <div sec:authorize="hasRole('STUDENT')">
                    <form th:action="@{/student/job/apply/{id}(id=${job.id})}" method="post">
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Apply Now</button>
                    </form>
                </div>
                <div sec:authorize="!hasRole('STUDENT') and !hasRole('EMPLOYER') and !hasRole('ADMIN')">
                    <a th:href="@{/login}" class="btn btn-primary" style="width: 100%; text-align: center; display: block;">Login to Apply</a>
                </div>
            </div>
            
            <div th:if="${#lists.isEmpty(jobs)}" style="grid-column: 1 / -1; text-align: center; padding: 3rem;">
                <h3 style="color: var(--text-secondary);">No jobs found matching your criteria.</h3>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
