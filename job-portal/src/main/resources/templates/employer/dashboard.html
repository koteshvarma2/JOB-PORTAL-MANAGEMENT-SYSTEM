<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Employer Dashboard')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2>Employer Dashboard</h2>
            <a th:href="@{/employer/job/new}" class="btn btn-primary">Post New Job</a>
        </div>
        
        <div class="card">
            <h3>Your Posted Jobs</h3>
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Location</th>
                            <th>Posted Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="job : ${jobs}">
                            <td th:text="${job.title}">Title</td>
                            <td th:text="${job.category}">Category</td>
                            <td th:text="${job.location}">Location</td>
                            <td th:text="${job.postedDate != null ? #temporals.format(job.postedDate, 'dd-MM-yyyy HH:mm') : 'N/A'}">Date</td>
                            <td>
                                <a th:href="@{/employer/job/{id}/applications(id=${job.id})}" class="btn btn-primary" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">View Applicants</a>
                                <a th:href="@{/employer/job/edit/{id}(id=${job.id})}" class="btn btn-success" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">Edit</a>
                                <form th:action="@{/employer/job/delete/{id}(id=${job.id})}" method="post" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this job?')">
                                    <button type="submit" class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(jobs)}">
                            <td colspan="5" style="text-align: center;">You haven't posted any jobs yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
