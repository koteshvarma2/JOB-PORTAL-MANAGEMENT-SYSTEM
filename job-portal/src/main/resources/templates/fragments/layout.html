<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | Job Portal'">Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>
        function togglePassword(fieldId, iconId) {
            var field = document.getElementById(fieldId);
            var icon = document.getElementById(iconId);
            if (field.type === "password") {
                field.type = "text";
                // Show "eye-off" icon
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                field.type = "password";
                // Show "eye" icon
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }
    </script>
</head>
<body>

<nav th:fragment="navbar" class="navbar">
    <a th:href="@{/}" class="navbar-brand">Job<span>Portal</span></a>
    <div class="navbar-links">
        <a th:href="@{/jobs}">Browse Jobs</a>
        
        <div sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}" class="btn">Log In</a>
            <a th:href="@{/register}" class="btn btn-primary">Sign Up</a>
        </div>
        
        <div sec:authorize="isAuthenticated()">
            <a th:href="@{/dashboard}" class="btn btn-primary">Dashboard</a>
            <a th:href="@{/logout}" class="btn btn-danger">Log Out</a>
            <span th:text="${#authentication.name}" style="margin-left: 10px; font-weight: 500;"></span>
        </div>
    </div>
</nav>

<footer th:fragment="footer">
    <p>&copy; 2026 Job Portal Management System. All rights reserved.</p>
</footer>

</body>
</html>
