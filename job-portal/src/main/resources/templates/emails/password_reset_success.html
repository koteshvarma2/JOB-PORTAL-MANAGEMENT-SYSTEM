<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
        .header { background-color: #4CAF50; color: white; padding: 20px; text-align: center; }
        .content { padding: 30px; text-align: center; }
        .success-icon { font-size: 48px; color: #4CAF50; margin-bottom: 20px; }
        .footer { background-color: #f9f9f9; padding: 20px; text-align: center; font-size: 12px; color: #777; border-top: 1px solid #e0e0e0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Password Reset Successful</h1>
        </div>
        <div class="content">
            <div class="success-icon">✓</div>
            <p>Your password has been successfully reset.</p>
            <p>You can now log in to your account using your new password.</p>
            <p>If you did not perform this action, please contact our support team immediately.</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 <span th:text="${companyName}">Job Portal</span>. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
