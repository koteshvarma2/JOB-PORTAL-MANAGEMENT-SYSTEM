<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Profile')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container" style="max-width: 800px;">
        <div class="card">
            <h2 style="margin-bottom: 1.5rem;">My Profile</h2>
            
            <div th:if="${param.success}" class="alert alert-success">
                Profile updated successfully.
            </div>
            <div th:if="${param.error == 'upload_failed'}" class="alert alert-error">
                Failed to upload resume. Please try again with a valid file.
            </div>
            <div th:if="${param.error == 'invalid_file'}" class="alert alert-error">
                Invalid file. Please select a valid resume file (PDF or DOC).
            </div>
            
            <form th:action="@{/student/profile/update}" th:object="${student}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{name}" class="form-control" disabled>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" th:field="*{email}" class="form-control" disabled>
                </div>
                <div class="form-group">
                    <label>Education Details</label>
                    <textarea th:field="*{education}" class="form-control" rows="3" placeholder="Degree, University, Graduation Year"></textarea>
                </div>
                <div class="form-group">
                    <label>Key Skills</label>
                    <input type="text" th:field="*{skills}" class="form-control" placeholder="e.g., Java, React, SQL">
                </div>
                <div class="form-group">
                    <label>Upload Resume (PDF/DOC)</label>
                    <input type="file" name="resume" class="form-control" accept=".pdf,.doc,.docx">
                    <div style="margin-top: 0.5rem; font-size: 0.85rem;" th:if="${student.resumeUrl != null}">
                        Current Resume: <a th:href="@{'/uploads/' + ${student.id} + '/' + ${student.resumeUrl}}" target="_blank">View Resume</a>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">Save Profile</button>
            </form>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
