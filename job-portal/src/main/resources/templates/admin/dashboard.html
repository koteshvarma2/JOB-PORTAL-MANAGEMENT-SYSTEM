<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Admin Dashboard')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container">
        <h2 style="margin-bottom: 2rem;">Admin Dashboard</h2>
        
        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); margin-bottom: 2rem;">
            <div class="card" style="text-align: center;">
                <h3 style="color: var(--text-secondary); margin-bottom: 0.5rem;">Total Users</h3>
                <h1 style="font-size: 3rem; color: var(--accent-color);" th:text="${totalUsers}">0</h1>
            </div>
            <div class="card" style="text-align: center;">
                <h3 style="color: var(--text-secondary); margin-bottom: 0.5rem;">Total Jobs Posted</h3>
                <h1 style="font-size: 3rem; color: var(--success);" th:text="${totalJobs}">0</h1>
            </div>
            <div class="card" style="text-align: center;">
                <h3 style="color: var(--text-secondary); margin-bottom: 0.5rem;">Total Applications</h3>
                <h1 style="font-size: 3rem; color: #a78bfa;" th:text="${totalApplications}">0</h1>
            </div>
        </div>
        
        <div class="card" style="text-align: center; padding: 2rem;">
            <h3>Manage Platform</h3>
            <p style="margin: 1rem 0;">View and manage all registered users.</p>
            <a th:href="@{/admin/users}" class="btn btn-primary">Manage Users</a>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
