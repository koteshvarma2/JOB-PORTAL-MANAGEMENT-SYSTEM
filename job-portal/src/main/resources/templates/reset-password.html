<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Reset Password')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container" style="max-width: 500px; margin-top: 4rem;">
        <div class="card">
            <h2 style="margin-bottom: 1.5rem; text-align: center;">Set New Password</h2>
            
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            
            <form th:action="@{/reset-password}" method="post">
                <input type="hidden" name="token" th:value="${token}">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" name="newPassword" class="form-control" required autofocus placeholder="Enter your new password">
                    <div style="margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox" id="showResetPwd" onclick="document.getElementById('newPassword').type = this.checked ? 'text' : 'password'">
                        <label for="showResetPwd" style="font-size: 0.85rem; color: var(--text-secondary); margin: 0; cursor: pointer;">Show Password</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Change Password</button>
            </form>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
